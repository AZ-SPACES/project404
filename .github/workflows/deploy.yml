name: Deploy

on:
  # Auto-deploy only after CI passes on main
  workflow_run:
    workflows: [CI]
    branches: [main]
    types: [completed]

  # Allow triggering a deploy manually from the Actions tab
  workflow_dispatch:

# The exact commit to build + ship. For workflow_run it's the commit that passed CI;
# for manual dispatch it's the branch head. Every image and the deploy pin to this.
env:
  REGISTRY: ghcr.io
  OWNER: az-spaces
  TAG: ${{ github.event.workflow_run.head_sha || github.sha }}

jobs:
  # ── 1. Build each service image once, in CI, and push to GHCR ────────────────
  build:
    name: Build & push images
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        # Only the backend runs on the droplet — all frontends are deployed on Vercel.
        include:
          - { service: backend, context: ./backend }
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.TAG }}

      # The container driver is required for the gha cache exporter below;
      # the default docker driver can't export cache.
      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          push: true
          build-args: ${{ matrix.build_args }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.OWNER }}/${{ matrix.service }}:latest
            ${{ env.REGISTRY }}/${{ env.OWNER }}/${{ matrix.service }}:${{ env.TAG }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}

  # ── 2. On the server: pull the pre-built images and roll with no downtime ────
  release:
    name: Release to production
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        env:
          GHCR_USER: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          password: ${{ secrets.DEPLOY_PASSWORD }}
          port: ${{ secrets.DEPLOY_PORT || '22' }}
          envs: TAG,REGISTRY,OWNER,GHCR_USER,GHCR_TOKEN
          script: |
            set -e
            cd ${{ secrets.DEPLOY_PATH }}

            # The droplet runs the backend-only profile: backend + postgres + redis + nginx
            # (api.aza.systems only). All frontends are on Vercel. The override mounts the
            # backend-only nginx config and disables the frontend services.
            COMPOSE="docker compose -f docker-compose.yml -f docker-compose.backend.yml"

            echo "→ Syncing tracked files to origin/main (server-local untracked files like backend/.env and the backend-only nginx default.conf are untouched)..."
            git fetch origin main
            git reset --hard origin/main

            echo "→ Logging in to GHCR and pulling the backend image ($TAG)..."
            echo "$GHCR_TOKEN" | docker login "$REGISTRY" -u "$GHCR_USER" --password-stdin
            export TAG
            $COMPOSE pull backend

            echo "→ Rolling backend with zero downtime..."
            docker rollout -f docker-compose.yml -f docker-compose.backend.yml backend
            # nginx caches the backend's upstream IP; reload so it picks up the new container.
            $COMPOSE exec -T nginx nginx -s reload || true

            echo "→ Reconciling infra (nginx/redis/postgres/certbot)..."
            $COMPOSE up -d --remove-orphans

            echo "→ Pruning unused images..."
            docker image prune -f

            $COMPOSE ps
            echo "✓ Deploy complete."
