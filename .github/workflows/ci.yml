name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Backend unit tests ────────────────────────────────────────────────────
  backend-test:
    name: Backend Tests (Java 21)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: temurin
          cache: maven

      - name: Run unit tests
        run: |
          mvn test --no-transfer-progress \
            -Dsurefire.excludes="**/*ApplicationTests.java"
        working-directory: backend

      - name: Upload test report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: backend/target/surefire-reports/
          retention-days: 7

  # ── Backend Docker build (compile + image validation) ─────────────────────
  backend-docker:
    name: Backend Docker Build
    runs-on: ubuntu-latest
    needs: backend-test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image (no push)
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: false
          tags: aza-backend:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Frontend lint + build (all 4 Next.js apps in parallel) ───────────────
  frontend-ci:
    name: Frontend CI (${{ matrix.app }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - app: aza-web
            NEXT_PUBLIC_API_URL: https://api.aza.systems
            NEXT_PUBLIC_SITE_URL: https://aza.systems
          - app: aza-admin
            NEXT_PUBLIC_API_URL: https://api.aza.systems
          - app: aza-merchants
            NEXT_PUBLIC_API_URL: https://api.aza.systems
          - app: aza-pay
            NEXT_PUBLIC_API_URL: https://api.aza.systems

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: ${{ matrix.app }}/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: ${{ matrix.app }}

      - name: Lint
        run: npm run lint
        working-directory: ${{ matrix.app }}
        env:
          NEXT_PUBLIC_API_URL: ${{ matrix.NEXT_PUBLIC_API_URL }}
          NEXT_PUBLIC_SITE_URL: ${{ matrix.NEXT_PUBLIC_SITE_URL }}

      - name: Build
        run: npm run build
        working-directory: ${{ matrix.app }}
        env:
          NEXT_PUBLIC_API_URL: ${{ matrix.NEXT_PUBLIC_API_URL }}
          NEXT_PUBLIC_SITE_URL: ${{ matrix.NEXT_PUBLIC_SITE_URL }}
          NEXT_TELEMETRY_DISABLED: 1
