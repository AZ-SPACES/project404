# Local build override. Production pulls pre-built images from GHCR (see docker-compose.yml);
# this file re-adds the build contexts so you can build/run locally without the registry.
#
#   docker compose -f docker-compose.yml -f docker-compose.build.yml build
#   docker compose -f docker-compose.yml -f docker-compose.build.yml up -d
#
# The `image:` keys are inherited from docker-compose.yml, so a local build tags the same
# names (defaulting to :latest) — no registry pull needed.

services:
  backend:
    build: ./backend

  aza-web:
    build:
      context: ./aza-web
      args:
        NEXT_PUBLIC_API_URL: https://api.aza.systems

  aza-admin:
    build:
      context: ./aza-admin
      args:
        NEXT_PUBLIC_API_URL: https://api.aza.systems

  aza-merchants:
    build:
      context: ./aza-merchants
      args:
        NEXT_PUBLIC_API_URL: https://api.aza.systems

  aza-pay:
    build:
      context: ./aza-pay
      args:
        NEXT_PUBLIC_API_URL: https://api.aza.systems

  aza-superagents:
    build:
      context: ./aza-superagents
      args:
        NEXT_PUBLIC_API_URL: https://api.aza.systems
