# H2 in-memory database — replaces PostgreSQL for tests
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL;NON_KEYWORDS=VALUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.generate-ddl=true

# Tests build the schema from entities on H2; the Postgres-specific Flyway
# migrations don't apply here.
spring.flyway.enabled=false

# Redis — fake host/port so LettuceConnectionFactory binds without error
# StringRedisTemplate and RedisMessageListenerContainer are @MockBean in every test
spring.data.redis.host=localhost
spring.data.redis.port=6379

# JWT — 32-byte minimum for HMAC-SHA256
app.jwt.secret=test-jwt-secret-key-that-is-at-least-64-characters-long-for-testing-only

# TOTP encryption — 32-byte AES key, base64-encoded
app.totp.encryption-key=dGVzdC10b3RwLWtleS1tdXN0LWJlLTMyLWJ5dGVzISE=

# Cloudinary — fake values (CloudinaryService is @MockBean where needed)
cloudinary.cloud-name=test
cloudinary.api-key=test
cloudinary.api-secret=test

# SMS
arkesel.api-key=test
arkesel.sender-id=test

# Security
app.security.challenge.hmac-secret=test-hmac-secret
app.waitlist.internal-secret=test-waitlist-secret

# TURN
turn.secret=test-turn-secret

# Payment-proof HMAC — set explicitly so the context loads without the env-var
# fallback chain (${PAYMENT_PROOF_HMAC_SECRET:${JWT_SECRET}}), which is unset in CI.
app.payment-proof.hmac-secret=test-payment-proof-secret
