spring.application.name=backend
# Server
server.port=8080
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB
# Limit non-multipart POST body size to 5 MB to prevent 
server.tomcat.max-http-form-post-size=5242880
server.tomcat.max-swallow-size=5242880

springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
# Set both to false in production to hide the API surface entirely
springdoc.swagger-ui.enabled=${SWAGGER_ENABLED:true}
springdoc.api-docs.enabled=${SWAGGER_ENABLED:true}
springdoc.swagger-ui.persistAuthorization=true

#PostgreSQL
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.generate-ddl=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=${SHOW_SQL:false}

# Redis
spring.data.redis.host=${REDIS_HOST}
spring.data.redis.port=${REDIS_PORT}
spring.data.redis.password=${REDIS_PASSWORD:}

# Arkesel SMS
arkesel.api-key=${ARKESEL_API_KEY}
arkesel.sender-id=${ARKESEL_SENDER_ID}

# Gmail SMTP
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${GMAIL_USERNAME}
spring.mail.password=${GMAIL_APP_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# JWT
app.jwt.secret=${JWT_SECRET}

# TOTP secret encryption key (AES-256-GCM)
# Generate with: openssl rand -base64 32
app.totp.encryption-key=${TOTP_ENCRYPTION_KEY}
app.jwt.access-expiration-ms=900000
app.jwt.refresh-expiration-ms=2592000000

#Cloudinary(For optimizing profile images)
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME}
cloudinary.api-key=${CLOUDINARY_API_KEY}
cloudinary.api-secret=${CLOUDINARY_API_SECRET}

# KYC Verification Mode
# MUST be false in production — set KYC_AUTO_VERIFY=true only in local/demo environments
kyc.auto-verify=${KYC_AUTO_VERIFY:false}


# Transfer Limits (GHS)
transfer.max-single-amount=${TRANSFER_MAX_SINGLE:10000}
transfer.max-daily-amount=${TRANSFER_MAX_DAILY:50000}

#WebSocket
app.websocket.max-text-message-size=65536
app.websocket.max-binary-message-size=524288

app.presence.ttl-seconds=65

# Firebase integration for push notifications
firebase.credentials-path=${FIREBASE_CREDENTIALS_PATH:firebase-service-account.json}

turn.secret=${TURN_SECRET}
turn.host=${TURN_HOST:turn.azapay.app}
turn.ttl-seconds=${TURN_TTL:3600}

# CORS — comma-separated list of allowed frontend origins
app.allowed-origins=${ALLOWED_ORIGINS:http://localhost:3000,http://localhost:3001}
app.admin.bootstrap-email=${ADMIN_BOOTSTRAP_EMAIL:}

# Comma-separated list of trusted reverse-proxy IPs whose X-Forwarded-For header is trusted.
# Leave blank in local development. In production, set to your load-balancer IP(s).
app.trusted-proxy-ips=${TRUSTED_PROXY_IPS:}

# Actuator — expose only health and info; never expose env/heapdump/beans in production
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized