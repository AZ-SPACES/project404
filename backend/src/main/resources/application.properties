spring.application.name=backend
 #server
server.port=8080
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

#PostgreSQL
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.generate-ddl=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=${SHOW_SQL:false}

#Redis
spring.data.redis.host=${REDIS_HOST}
spring.data.redis.port=${REDIS_PORT}

# Arkesel SMS
arkesel.api-key=${ARKESEL_API_KEY}
arkesel.sender-id=${ARKESEL_SENDER_ID}

# Gmail SMTP
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${GMAIL_USERNAME}
spring.mail.password=${GMAIL_APP_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# JWT (we'll use these later)
app.jwt.secret=${JWT_SECRET}
app.jwt.access-expiration-ms=900000
app.jwt.refresh-expiration-ms=2592000000

#Cloudinary(For optimizing profile images)
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME}
cloudinary.api-key=${CLOUDINARY_API_KEY}
cloudinary.api-secret=${CLOUDINARY_API_SECRET}

# KYC Verification Mode
# Set to true for demo/testing (auto-approves KYC submissions)
# Set to false for production (requires manual review or KYC provider webhook)
kyc.auto-verify=${KYC_AUTO_VERIFY:true}


# Transfer Limits (GHS)
transfer.max-single-amount=${TRANSFER_MAX_SINGLE:10000}
transfer.max-daily-amount=${TRANSFER_MAX_DAILY:50000}

#WebSocket
spring.websocket.max-text-message-size=65536
spring.websocket.max-binary-message-size=524288

presence.ttl-seconds=65