<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bulk Transfer Summary</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; line-height: 1.5; color: #111827; margin: 0; padding: 0; background-color: #f9fafb; }
        .container { max-width: 600px; margin: 20px auto; background: #ffffff; border: 1px solid #e5e7eb; border-radius: 8px; overflow: hidden; }
        .header { padding: 32px; text-align: center; background-color: #111827; }
        .logo { width: 48px; height: 48px; }
        .content { padding: 32px; }
        .footer { padding: 24px; text-align: center; font-size: 14px; color: #6b7280; border-top: 1px solid #f3f4f6; }
        h1 { font-size: 24px; font-weight: 700; margin-top: 0; }
        p { margin-bottom: 16px; font-size: 16px; }
        .badge-ok { display: inline-block; background: #dcfce7; color: #15803d; font-size: 12px; font-weight: 600; padding: 4px 10px; border-radius: 999px; margin-bottom: 16px; }
        .badge-partial { display: inline-block; background: #fef9c3; color: #854d0e; font-size: 12px; font-weight: 600; padding: 4px 10px; border-radius: 999px; margin-bottom: 16px; }
        .badge-fail { display: inline-block; background: #fee2e2; color: #b91c1c; font-size: 12px; font-weight: 600; padding: 4px 10px; border-radius: 999px; margin-bottom: 16px; }
        .stats { display: flex; gap: 12px; margin: 24px 0; }
        .stat { flex: 1; background: #f3f4f6; border-radius: 8px; padding: 16px; text-align: center; border: 1px solid #e5e7eb; }
        .stat-num { font-size: 28px; font-weight: 800; color: #111827; }
        .stat-num.success { color: #15803d; }
        .stat-num.failed { color: #b91c1c; }
        .stat-label { font-size: 12px; color: #6b7280; margin-top: 4px; }
        .amount { font-size: 32px; font-weight: 800; color: #111827; margin: 8px 0; }
        .processed { font-size: 14px; color: #6b7280; margin-top: 20px; }
        .btn { display: inline-block; padding: 12px 24px; background-color: #111827; color: #ffffff !important; text-decoration: none; border-radius: 8px; font-weight: 600; margin-top: 16px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header"><img src="cid:paperplane" alt="AZA" class="logo"></div>
        <div class="content">
            <span th:if="${status == 'COMPLETED'}" class="badge-ok">Completed</span>
            <span th:if="${status == 'PARTIALLY_COMPLETED'}" class="badge-partial">Partially Completed</span>
            <span th:if="${status == 'FAILED'}" class="badge-fail">Failed</span>

            <h1>Bulk Transfer Summary</h1>
            <p>Hi <span th:text="${name}">Merchant</span>, your bulk transfer from <strong th:text="${businessName}">Your Business</strong> has finished processing.</p>

            <div class="amount">GHS <span th:text="${#numbers.formatDecimal(totalAmount, 1, 2)}">0.00</span></div>
            <div style="font-size: 14px; color: #6b7280; margin-bottom: 20px;">Total disbursed</div>

            <div class="stats">
                <div class="stat">
                    <div class="stat-num success" th:text="${successCount}">0</div>
                    <div class="stat-label">Successful</div>
                </div>
                <div class="stat">
                    <div class="stat-num failed" th:text="${failureCount}">0</div>
                    <div class="stat-label">Failed</div>
                </div>
            </div>

            <p class="processed">Processed at <span th:text="${processedAt}">May 27, 2026 14:00</span></p>
            <a href="aza://merchant/bulk-transfers" class="btn">View Details</a>
        </div>
        <div class="footer">&copy; 2026 AZA. All rights reserved.</div>
    </div>
</body>
</html>
