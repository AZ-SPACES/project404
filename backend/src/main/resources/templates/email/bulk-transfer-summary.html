<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Bulk Transfer Summary</title>
</head>
<body style="font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;line-height:1.5;color:#0E0F0C;margin:0;padding:0;background-color:#E6ECE1;">
<div style="max-width:600px;margin:40px auto;background:#fff;border:1px solid #DADCE0;border-radius:12px;overflow:hidden;">
  <div style="padding:28px 40px;border-bottom:1px solid #EAECEF;">
    <table cellpadding="0" cellspacing="0" border="0"><tr>
      <td style="vertical-align:middle;padding-right:10px;"><img src="cid:aza_merchant" alt="AZA" width="28" height="28" style="display:block;border:0;"></td>
      
    </tr></table>
  </div>
  <div style="padding:40px;">
    <span th:if="${status == 'COMPLETED'}" style="display:inline-block;font-size:11px;font-weight:700;padding:5px 12px;border-radius:999px;margin-bottom:20px;letter-spacing:0.06em;text-transform:uppercase;background:#B7EE7A;color:#174717;">Completed</span>
    <span th:if="${status == 'PARTIALLY_COMPLETED'}" style="display:inline-block;font-size:11px;font-weight:700;padding:5px 12px;border-radius:999px;margin-bottom:20px;letter-spacing:0.06em;text-transform:uppercase;background:#FFF8E1;color:#FF6D00;">Partially Completed</span>
    <span th:if="${status == 'FAILED'}" style="display:inline-block;font-size:11px;font-weight:700;padding:5px 12px;border-radius:999px;margin-bottom:20px;letter-spacing:0.06em;text-transform:uppercase;background:#FFF5F5;color:#C53030;">Failed</span>
    <h1 style="font-size:32px;font-weight:800;color:#0E0F0C;margin:0 0 16px 0;letter-spacing:-0.02em;line-height:1.2;">Bulk Transfer Summary</h1>
    <p style="font-size:16px;color:#5F6368;margin:0 0 16px 0;line-height:1.6;">Hi <span th:text="${name}">Merchant</span>, your bulk transfer from <strong style="color:#0E0F0C;" th:text="${businessName}">Your Business</strong> has finished processing.</p>
    <div style="background:#F8F9FA;border:1px solid #EAECEF;border-radius:10px;overflow:hidden;margin:24px 0;">
      <div style="padding:20px 20px 16px;">
        <span style="font-size:11px;font-weight:700;color:#9AA0A6;letter-spacing:0.06em;text-transform:uppercase;">Total Disbursed</span>
        <p style="font-size:40px;font-weight:900;color:#0E0F0C;margin:8px 0 0;line-height:1;">GHS <span th:text="${#numbers.formatDecimal(totalAmount,1,2)}">0.00</span></p>
      </div>
      <table cellpadding="0" cellspacing="0" border="0" width="100%" style="border-collapse:collapse;border-top:1px solid #EAECEF;">
        <tr style="border-bottom:1px solid #EAECEF;">
          <td style="padding:16px 20px;text-align:center;">
            <p style="font-size:28px;font-weight:900;color:#174717;margin:0 0 4px;line-height:1;" th:text="${successCount}">0</p>
            <p style="font-size:12px;font-weight:600;color:#9AA0A6;margin:0;text-transform:uppercase;letter-spacing:0.05em;">Successful</p>
          </td>
          <td style="width:1px;background:#EAECEF;"></td>
          <td style="padding:16px 20px;text-align:center;">
            <p style="font-size:28px;font-weight:900;color:#C53030;margin:0 0 4px;line-height:1;" th:text="${failureCount}">0</p>
            <p style="font-size:12px;font-weight:600;color:#9AA0A6;margin:0;text-transform:uppercase;letter-spacing:0.05em;">Failed</p>
          </td>
        </tr>
        <tr><td colspan="3" style="padding:14px 20px;font-size:14px;color:#5F6368;">Processed at <span style="font-weight:600;color:#0E0F0C;" th:text="${processedAt}">May 27, 2026 14:00</span></td></tr>
      </table>
    </div>
    <a href="aza://merchant/bulk-transfers" style="display:inline-block;padding:14px 28px;background:#174717;color:#fff !important;text-decoration:none;border-radius:8px;font-size:15px;font-weight:700;margin-top:8px;">View Details</a>
  </div>
  <div style="padding:28px 40px;background:#F8F9FA;border-top:1px solid #EAECEF;">
    <p style="margin:0;font-size:13px;color:#9AA0A6;">&copy; 2026 AZA. All rights reserved. &bull; <a href="mailto:support@aza.systems" style="color:#9AA0A6;">support@aza.systems</a></p>
  </div>
</div>
</body>
</html>
