<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>You're Invited to AZA</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; line-height: 1.5; color: #111827; margin: 0; padding: 0; background-color: #f9fafb; }
        .container { max-width: 600px; margin: 20px auto; background: #ffffff; border: 1px solid #e5e7eb; border-radius: 8px; overflow: hidden; }
        .header { padding: 32px; text-align: center; background-color: #111827; }
        .logo { width: 48px; height: 48px; }
        .content { padding: 32px; text-align: center; }
        .footer { padding: 24px; text-align: center; font-size: 14px; color: #6b7280; border-top: 1px solid #f3f4f6; }
        h1 { font-size: 28px; font-weight: 800; margin-top: 0; color: #111827; }
        p { margin-bottom: 16px; font-size: 16px; color: #374151; }
        .badge { display: inline-block; background: #dcfce7; color: #15803d; font-size: 12px; font-weight: 600; padding: 4px 10px; border-radius: 999px; margin-bottom: 20px; }
        .btn { display: inline-block; padding: 16px 36px; background-color: #111827; color: #ffffff !important; text-decoration: none; border-radius: 8px; font-weight: 700; font-size: 16px; margin-top: 20px; }
        .link-note { font-size: 13px; color: #9ca3af; margin-top: 20px; word-break: break-all; }
        .expiry { font-size: 13px; color: #b45309; margin-top: 16px; background: #fef9c3; border-radius: 8px; padding: 12px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header"><img src="cid:paperplane" alt="AZA" class="logo"></div>
        <div class="content">
            <span class="badge">You're Invited</span>
            <h1>Welcome to AZA</h1>
            <p>You're off the waitlist! Create your AZA account now and start sending money, splitting bills, and more.</p>

            <a th:href="${inviteUrl}" class="btn">Create My Account</a>

            <div class="expiry">This invite link expires in 7 days.</div>
            <div class="link-note">Or copy this link: <span th:text="${inviteUrl}">https://aza.systems/signup?invite=CODE</span></div>
        </div>
        <div class="footer">&copy; 2026 AZA. All rights reserved.</div>
    </div>
</body>
</html>
