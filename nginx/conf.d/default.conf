# HTTP-only — used during initial SSL certificate setup.
# After running scripts/init-ssl.sh, this file is replaced by default.ssl.conf.

server {
    listen 80;
    server_name aza.systems www.aza.systems api.aza.systems admin.aza.systems;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 404 "SSL not yet configured. Run scripts/init-ssl.sh on the server.";
    }
}
