# HTTP-only for initial SSL setup (api.aza.systems only).
# Run scripts/init-api-ssl.sh, then this is replaced by default.ssl.conf.

server {
    listen 80;
    server_name api.aza.systems;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 404 "SSL not yet configured. Run scripts/init-api-ssl.sh";
    }
}
