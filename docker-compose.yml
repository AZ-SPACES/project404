services:
  postgres:
    image: postgres:16
    container_name: aza-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-aza_db}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - aza-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d ${DB_NAME:-aza_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: aza-redis
    restart: unless-stopped
    command: >
      sh -c "if [ -n \"$$REDIS_PASSWORD\" ]; then redis-server --requirepass $$REDIS_PASSWORD; else redis-server; fi"
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
    volumes:
      - redis_data:/data
    networks:
      - aza-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    image: ${REGISTRY:-ghcr.io}/${OWNER:-az-spaces}/backend:${TAG:-latest}
    restart: unless-stopped
    env_file: ./backend/.env
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/${DB_NAME:-aza_db}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      JWT_SECRET: ${JWT_SECRET}
      TOTP_ENCRYPTION_KEY: ${TOTP_ENCRYPTION_KEY}
      ARKESEL_API_KEY: ${ARKESEL_API_KEY}
      ARKESEL_SENDER_ID: ${ARKESEL_SENDER_ID}
      BREVO_API_KEY: ${BREVO_API_KEY}
      BREVO_SENDER_EMAIL: ${BREVO_SENDER_EMAIL:-noreply@aza.systems}
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET}
      TURN_SECRET: ${TURN_SECRET}
      TURN_HOST: ${TURN_HOST:-turn.aza.systems}
      APP_BASE_URL: https://aza.systems
      APP_API_BASE_URL: https://api.aza.systems
      # Single-instance deploy: skip the Redis hop for real-time delivery.
      # Set to "false" if you ever scale aza-backend beyond one instance.
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      WEBSOCKET_LOCAL_DELIVERY: "true"
      ALLOWED_ORIGINS: https://aza.systems,https://www.aza.systems,https://admin.aza.systems,https://merchants.aza.systems,https://pay.aza.systems
      TRUSTED_PROXY_IPS: 172.16.0.0/12,127.0.0.1,::1
      SWAGGER_ENABLED: true
      HCAPTCHA_SECRET: ${HCAPTCHA_SECRET:-}
      CHALLENGE_HMAC_SECRET: ${CHALLENGE_HMAC_SECRET}
      PAYMENT_PROOF_HMAC_SECRET: ${PAYMENT_PROOF_HMAC_SECRET}
      PASSKIT_API_KEY: ${PASSKIT_API_KEY:-}
      PASSKIT_API_SECRET: ${PASSKIT_API_SECRET:-}
      PASSKIT_TEMPLATE_ID: ${PASSKIT_TEMPLATE_ID:-}
      ADMIN_BOOTSTRAP_EMAIL: ${ADMIN_BOOTSTRAP_EMAIL:-}
      FIREBASE_CREDENTIALS_PATH: /etc/aza/firebase-service-account.json
    volumes:
      - ./backend/src/main/resources/firebase-service-account.json:/etc/aza/firebase-service-account.json:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      # Keep the `aza-backend` name nginx proxies to, even though container_name is
      # dropped so docker-rollout can run two copies during a zero-downtime swap.
      aza-network:
        aliases:
          - aza-backend
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://localhost:8080/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s

  aza-web:
    image: ${REGISTRY:-ghcr.io}/${OWNER:-az-spaces}/aza-web:${TAG:-latest}
    restart: unless-stopped
    environment:
      NODE_ENV: production
    networks:
      - aza-network
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://localhost:3000/"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  aza-admin:
    image: ${REGISTRY:-ghcr.io}/${OWNER:-az-spaces}/aza-admin:${TAG:-latest}
    restart: unless-stopped
    environment:
      NODE_ENV: production
    networks:
      - aza-network
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://localhost:3000/"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  aza-merchants:
    image: ${REGISTRY:-ghcr.io}/${OWNER:-az-spaces}/aza-merchants:${TAG:-latest}
    restart: unless-stopped
    environment:
      NODE_ENV: production
    networks:
      - aza-network
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://localhost:3001/"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  aza-pay:
    image: ${REGISTRY:-ghcr.io}/${OWNER:-az-spaces}/aza-pay:${TAG:-latest}
    restart: unless-stopped
    environment:
      NODE_ENV: production
    networks:
      - aza-network
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://localhost:3002/"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  aza-superagents:
    image: ${REGISTRY:-ghcr.io}/${OWNER:-az-spaces}/aza-superagents:${TAG:-latest}
    restart: unless-stopped
    environment:
      NODE_ENV: production
    networks:
      - aza-network
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://localhost:3003/"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  nginx:
    image: nginx:alpine
    container_name: aza-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - certbot_webroot:/var/www/certbot:ro
      - certbot_certs:/etc/letsencrypt:ro
    depends_on:
      - backend
    networks:
      - aza-network

  certbot:
    image: certbot/certbot
    container_name: aza-certbot
    volumes:
      - certbot_webroot:/var/www/certbot
      - certbot_certs:/etc/letsencrypt
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew --quiet; sleep 12h & wait $${!}; done'"
    restart: unless-stopped

networks:
  aza-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  certbot_webroot:
  certbot_certs:
