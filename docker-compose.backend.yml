# Use this on DigitalOcean — all frontends are deployed on Vercel, so the droplet runs
# only backend + postgres + redis + nginx (api.aza.systems).
# Command: docker compose -f docker-compose.yml -f docker-compose.backend.yml up -d

services:
  aza-web:
    profiles: ["disabled"]

  aza-admin:
    profiles: ["disabled"]

  aza-merchants:
    profiles: ["disabled"]

  aza-pay:
    profiles: ["disabled"]

  aza-superagents:
    profiles: ["disabled"]

  postgres:
    ports:
      - "127.0.0.1:5432:5432"

  nginx:
    depends_on: !reset
      - backend
    volumes:
      - ./nginx/backend-only/conf.d:/etc/nginx/conf.d:ro
      - certbot_webroot:/var/www/certbot:ro
      - certbot_certs:/etc/letsencrypt:ro
