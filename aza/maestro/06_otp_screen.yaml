appId: com.semekor.k.aza
name: OTP Screen - Input Handling and Resend
---
- launchApp:
    clearState: true
- waitForAnimationToEnd

- tapOn: "Login"
- waitForAnimationToEnd

# Enter credentials to reach OTP screen
- tapOn: "000 000 0000"
- inputText: ${TEST_PHONE}
- tapOn:
    text: "Password"
- inputText: ${TEST_PASSWORD}
- tapOn: "Continue"
- waitForAnimationToEnd

# OTP screen assertions
- assertVisible: ${TEST_PHONE}
- assertVisible: "Verify"

# Verify button should be disabled with no input
- assertNotVisible:
    text: "Verify"
    enabled: true

# Type digits one by one - focus should advance automatically
- tapOn:
    id: "otp-input-0"
- inputText: "1"
- inputText: "2"
- inputText: "3"
- inputText: "4"
- inputText: "5"
- inputText: "6"

# All 6 digits entered - Verify button should be enabled
- assertVisible:
    text: "Verify"

# Resend OTP (after countdown expires - 57 seconds)
# Only asserting countdown text is visible initially
- assertVisible: "Resend"

# Backspace should work - clears last digit and refocuses
- tapOn:
    id: "otp-input-5"
- pressKey: Backspace
- assertNotVisible:
    text: "Verify"
    enabled: true

# Re-enter last digit
- inputText: "6"

# Submit OTP
- tapOn: "Verify"
- waitForAnimationToEnd:
    timeout: 5000
